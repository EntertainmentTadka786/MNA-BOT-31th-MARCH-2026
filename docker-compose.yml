version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: entertainment_tadka_bot
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./backups:/var/www/html/backups
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
